<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Correct static file linking -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">

  <title>Car Price Predictor</title>
</head>

<body class="bg-dark">

<div class="container">
  <div class="row">
    <div class="card mt-5 w-100">
      
      <div class="card-header text-center">
        <h1>Welcome to Car Price Predictor</h1>
      </div>

      <div class="card-body">

        <form method="post" action="#" accept-charset="utf-8">

            <div class="col-10 form-group" style="text-align: center">
                <label><b>Select Company:</b></label>
                <select class="selectpicker form-control" id="company" name="company" required="1" onchange="load_car_models(this.id, 'car_model')">

                  {% for company in companies %}
                    <option value="{{company }}">{{ company }}</option>
                  {% endfor %}
                </select>
            </div>

            <div class="col-10 form-group" style="text-align: center">
                <label><b>Select Model:</b></label>
                <select class="selectpicker form-control" id="car_model" name="car_model" required="1">
                    <option value=""></option>"
                </select>
            </div>

             <div class="col-10 form-group" style="text-align: center">
                <label><b>Select Year of Purchase:</b></label>
                <select class="selectpicker form-control" id="year" name="year" required="1">
                    <option value=""></option>"
                </select>
            </div>

            <div class="col-10 form-group" style="text-align: center">
                <label><b>Select Fuel Type:</b></label>
                <select class="selectpicker form-control" id="fuel_type" name="fuel_type" required="1">
                    <option value=""></option>"
                </select>
            </div>

            <div class="col-10 form-group" style="text-align: center">
                <label><b>Enter Number of Kilometers travelled:</b></label>
                <input class = "form-control" type="text" id="kilo_driven" name="kilo_driven" placeholder = "Enter no. of Kilometer travelled">
            </div>

            <div class="col-10 form-group" style="text-align= center">
                <button class="btn-primary form-control" onclick="">Predict Price</button>
            </div>
            
             
        </form>
        <p class="text-center">Your ML model UI will go here</p>
      </div>

    </div>
  </div>
</div>
<script>


  function load_car_models(company_id, car_model_id)
  {
    var company = document.getElementById(company_id);
    var car_model = document.getElementById(car_model_id);
    car_model.options.length = 0;
    
      {% for company in companies %}

      if(company.value == "{{company}}")
      {
        {% for model in car_models %}

        {% if company in model %}

               var newOption = document.createElement("option");
               newOption.value = "{{model}}";
                newOption.innerHTML = "{{model}}";
                car_model.options.add(newOption);
        {% endif %}

        {% endfor %}
      }
      {% endfor %}
  }



</script>

  <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>

</body>
</html>
